{% extends "base.html" %}
{% block content %}

<div class="page-title">🔑 Change Password</div>

<div class="card" style="max-width:480px;">
    {% if error %}
    <div style="background:#ffe0e0;border:1px solid #f00;padding:10px;border-radius:6px;margin-bottom:16px;color:#c00;">
        ⚠️ {{ error }}
    </div>
    {% endif %}
    {% if success %}
    <div style="background:#e0ffe0;border:1px solid #0a0;padding:10px;border-radius:6px;margin-bottom:16px;color:#060;">
        ✅ {{ success }}
    </div>
    {% endif %}

    <form method="POST" action="/change_password">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div style="margin-bottom:14px;">
            <label><strong>Current Password</strong></label>
            <input type="password" name="current_password" required
                   style="width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px;">
        </div>

        <div style="margin-bottom:14px;">
            <label><strong>New Password</strong></label>
            <input type="password" name="new_password" required minlength="6"
                   style="width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px;">
        </div>

        <div style="margin-bottom:20px;">
            <label><strong>Confirm New Password</strong></label>
            <input type="password" name="confirm_password" required minlength="6"
                   style="width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px;">
        </div>

        <button type="submit" class="btn">🔒 Change Password</button>
    </form>
</div>

{% endblock %}
