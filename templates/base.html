<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jewellery Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>💎 Ratnakar Jewellery</h2>
        <a href="/">Dashboard</a>
        <a href="/view_stock">View Stock</a>
        <a href="/add_purchase">Add Purchase</a>
        <a href="/record_sale">Record Sale</a>
        <a href="/view_purchases">View Purchases</a>
        <a href="/view_sales">View Sales</a>
        <a href="/search">🔍 Search</a>
        <a href="/report">📊 Reports</a>
        <a href="/import_data">📂 Import Data</a>
        <!-- Logout at the bottom of sidebar -->
        <form method="POST" action="/logout" style="margin-top: auto; padding-top: 20px;">
            <button type="submit" class="btn-logout">🚪 Logout</button>
        </form>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
        <footer class="footer">
            Ratnakar Jewellery {{ 2026 }} &nbsp;|&nbsp; Logged in as: <strong>{{ session.get('username', '') }}</strong>
        </footer>
    </main>
</div>

</body>
</html>
