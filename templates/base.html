<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewellery Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Hamburger button — only visible on mobile -->
<button class="menu-toggle" id="menuToggle">☰</button>

<!-- Dark overlay when sidebar is open on mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <h2>💎 Ratnakar Jewellery</h2>
        <a href="/">📊 Dashboard</a>
        <a href="/view_stock">📦 View Stock</a>
        <a href="/add_purchase">📥 Add Purchase</a>
        <a href="/record_sale">📤 Record Sale</a>
        <a href="/view_purchases">🧾 View Purchases</a>
        <a href="/view_sales">💰 View Sales</a>
        <a href="/search">🔍 Search</a>
        <a href="/report">📊 Reports</a>
        <a href="/import_data">📂 Import Data</a>
        <a href="/export_data">📤 Export Data</a>
        <a href="/change_password">🔑 Change Password</a>

        <form method="POST" action="/logout" style="margin-top: auto; padding-top: 20px;">
            <button type="submit" class="btn-logout">🚪 Logout</button>
        </form>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
        <footer class="footer">
            Ratnakar Jewellery {{ 2026 }} &nbsp;|&nbsp;
            Logged in as: <strong>{{ session.get('username', '') }}</strong>
        </footer>
    </main>

</div>

<script>
    const toggle  = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    toggle.addEventListener('click', function () {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', function () {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    });

    // Close sidebar when a link is clicked on mobile
    sidebar.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });
    });
</script>

</body>
</html>
